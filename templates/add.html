<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <title>Додати пацієнта</title>
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.0/dist/flatly/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f4f7f6;
        }

        .card {
            border-radius: 10px;
            border: none;
            max-width: 600px;
            margin: 0 auto;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-4">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="fas fa-hospital-user me-2"></i>Клініка</a>
        </div>
    </nav>

    <div class="container">
        <div class="card shadow-sm p-4 mb-5">
            <h4 class="mb-4 text-primary"><i class="fas fa-user-plus me-2"></i>Новий пацієнт</h4>

            <form method="POST" action="/add">
                <div class="mb-3">
                    <label class="form-label fw-bold">Ім'я та Прізвище <span class="text-danger">*</span></label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-user"></i></span>
                        <input type="text" class="form-control" name="name" placeholder="Іванов Іван" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Дата народження <span class="text-danger">*</span></label>
                        <input type="date" class="form-control" name="birth_date" max="2026-12-31" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Група крові</label>
                        <select class="form-select" name="blood_type">
                            {% for b_type in blood_types %}
                            <option value="{{ b_type }}">{{ b_type }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Лікуючий лікар <span class="text-danger">*</span></label>
                    <select class="form-select" name="doctor_id" required>
                        <option value="" disabled selected>-- Оберіть вільного лікаря --</option>
                        {% for doc in doctors %}
                        <option value="{{ doc.id }}">{{ doc.name }} ({{ doc.specialization }})</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold">Палата</label>
                    <select class="form-select" name="ward_id">
                        <option value="">-- Без палати (Амбулаторно) --</option>
                        {% for ward in wards %}
                        <option value="{{ ward.id }}">Палата №{{ ward.ward_number }} (Поверх {{ ward.floor }})</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="d-flex justify-content-between">
                    <a href="/" class="btn btn-light"><i class="fas fa-arrow-left me-1"></i> Назад</a>
                    <button type="submit" class="btn btn-success"><i class="fas fa-save me-1"></i> Зберегти</button>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
